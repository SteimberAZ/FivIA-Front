<section class="max-w-6xl mx-auto w-full">
    <div id="welcome" class="mb-10">
        <h2 class="text-3xl md:text-4xl font-bold font-outfit text-gray-800 dark:text-slate-100">Gestión y Creación de Chatbots</h2>
    </div>

    <h3 class="text-xl font-semibold font-outfit text-gray-700 dark:text-slate-200 mb-6">Tus ChatBots Activos</h3>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
        <article class="glass-card p-6 rounded-2xl border border-fivia/30 dark:border-[#34d399]/40 hover:-translate-y-1 hover:shadow-lg transition-all duration-300">
            <div class="flex items-center gap-4 mb-6">
                <div class="p-3 rounded-xl bg-fivia/10 dark:bg-[#34d399]/20 text-fivia dark:text-[#34d399]">
                    <svg class="w-8 h-8" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                        <circle cx="12" cy="5" r="2"></circle>
                        <path d="M12 7v4"></path>
                    </svg>
                </div>
                <h4 class="text-xl font-bold font-outfit text-gray-800 dark:text-slate-100">ChatBot Restaurant</h4>
            </div>
            
            <div class="flex flex-col gap-4 border-t border-gray-100 dark:border-white/10 pt-4">
                <p class="text-fivia dark:text-[#34d399] font-bold text-sm">✓ Activo</p>
                <div class="flex flex-wrap gap-2">
                    <button class="px-4 py-2 rounded-lg bg-gray-100 dark:bg-white/5 hover:bg-gray-200 dark:hover:bg-white/10 text-gray-700 dark:text-slate-300 text-sm font-semibold transition-colors">Pausar</button>
                    <button class="px-4 py-2 rounded-lg bg-blue-500/10 text-blue-600 dark:text-blue-400 hover:bg-blue-500 hover:text-white text-sm font-semibold transition-colors">Editar</button>
                    <button class="px-4 py-2 rounded-lg bg-red-500/10 text-red-600 dark:text-red-400 hover:bg-red-500 hover:text-white text-sm font-semibold transition-colors">Eliminar</button>
                </div>
            </div>
        </article>
    </div>

    <hr class="border-t border-gray-200 dark:border-[#34d399]/20 my-10">

    <h3 class="text-xl font-semibold font-outfit text-gray-700 dark:text-slate-200 mb-6">Introduce los datos de tu nuevo bot</h3>
    
    <form id="createBotForm" class="flex flex-col gap-6 max-w-3xl">
        <div class="flex flex-col">
            <label class="font-outfit font-bold text-gray-700 dark:text-slate-200 mb-2">Nombre del ChatBot</label>
            <input type="text" id="botName" name="botName" placeholder="Introduce el nombre de tu ChatBot" class="input-styled" required>
        </div>

        <div class="flex flex-col">
            <label class="font-outfit font-bold text-gray-700 dark:text-slate-200 mb-2">Objetivo del ChatBot</label>
            <textarea id="botObjective" name="botObjective" placeholder="Describe qué debe hacer tu ChatBot" rows="4" class="input-styled resize-y" required></textarea>
        </div>

        <div class="flex flex-col">
            <label class="font-outfit font-bold text-gray-700 dark:text-slate-200 mb-2">Tipo de ChatBot</label>
            <select id="botType" name="botType" class="input-styled cursor-pointer">
                <option value="ventas">Ventas</option>
                <option value="soporte">Soporte</option>
                <option value="reservas">Reservas</option>
                <option value="informacion">Información</option>
            </select>
        </div>
        
        <div class="mt-4">
            <button type="submit" class="btn-primary w-full md:w-auto px-10">Crear ChatBot</button>
        </div>
    </form>
</section>
