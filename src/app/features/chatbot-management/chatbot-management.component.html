<section class="max-w-6xl mx-auto w-full animate-fade-in">
    <div id="welcome" class="mb-6 sm:mb-10 animate-slide-up">
        <h2 class="text-2xl sm:text-3xl md:text-4xl font-bold font-outfit text-gray-800 dark:text-slate-100">Configuración de tu Chatbot</h2>
    </div>

    <div class="glass-card p-5 sm:p-8 rounded-2xl sm:rounded-3xl border border-gray-200 dark:border-white/10 max-w-3xl mx-auto animate-scale-up hover-lift">
        <div class="flex items-center justify-between mb-6 pb-6 border-b border-gray-100 dark:border-white/10 gap-4">
            <div>
                <h3 class="text-lg sm:text-xl font-bold font-outfit text-gray-800 dark:text-slate-100">Estado de la IA</h3>
                <p class="text-gray-500 dark:text-slate-400 text-xs sm:text-sm mt-1 leading-relaxed">Apaga la IA si prefieres responder manualmente desde el Live Chat.</p>
            </div>
            
            <button 
                type="button"
                (click)="aiActive = !aiActive" 
                class="relative inline-flex h-9 w-16 min-h-[44px] min-w-[64px] shrink-0 items-center rounded-full transition-colors focus:outline-none cursor-pointer"
                [ngClass]="aiActive ? 'bg-fivia' : 'bg-gray-300 dark:bg-gray-700'">
                <span 
                class="inline-block h-7 w-7 transform rounded-full bg-white shadow-md transition-transform"
                [ngClass]="aiActive ? 'translate-x-8' : 'translate-x-1'">
                </span>
            </button>
        </div>

        <form (ngSubmit)="saveConfig()" class="flex flex-col gap-5 sm:gap-6">
            <div class="flex flex-col">
                <label class="font-outfit font-bold text-xs sm:text-sm text-gray-700 dark:text-slate-200 mb-2">Nombre con el que se presenta</label>
                <input type="text" [(ngModel)]="botName" name="botName" placeholder="Ej: Asistente FivIA" class="input-styled text-xs sm:text-sm min-h-[44px]" required>
            </div>

            <div class="flex flex-col">
                <label class="font-outfit font-bold text-xs sm:text-sm text-gray-700 dark:text-slate-200 mb-2">Objetivo del ChatBot</label>
                <textarea [(ngModel)]="botObjective" name="botObjective" placeholder="Instrucciones para la IA (ej: Eres un asistente amable que ayuda a hacer reservas...)" rows="5" class="input-styled resize-y text-xs sm:text-sm" required></textarea>
            </div>

            <div class="flex flex-col">
                <label class="font-outfit font-bold text-xs sm:text-sm text-gray-700 dark:text-slate-200 mb-2">Comportamiento principal</label>
                <select [(ngModel)]="botType" name="botType" class="input-styled cursor-pointer text-xs sm:text-sm min-h-[44px]">
                    <option value="ventas">Ventas y Persuasión</option>
                    <option value="soporte">Soporte y Atención al Cliente</option>
                    <option value="reservas">Gestión de Reservas</option>
                    <option value="informacion">Solo Información</option>
                </select>
            </div>
            
            <div class="mt-4 flex flex-col sm:flex-row items-center gap-4">
                <button type="submit" [disabled]="isSaving" class="btn-primary w-full sm:w-auto px-10 min-h-[44px] text-xs sm:text-sm">
                    {{ isSaving ? 'Guardando...' : 'Guardar Configuración' }}
                </button>
                <p class="text-xs sm:text-sm font-bold" [ngClass]="saveMessage.includes('Error') ? 'text-red-500' : 'text-fivia dark:text-[#34d399]'" *ngIf="saveMessage">{{ saveMessage }}</p>
            </div>
        </form>
    </div>
</section>
