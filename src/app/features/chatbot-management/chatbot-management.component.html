<section>
    <div id="welcome">
        <h2>Gestión y Creación de Chatbots</h2>
    </div>

    <h3>Tus ChatBots Activos</h3>
    <article>
        <div class="svg">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                <circle cx="12" cy="5" r="2"></circle>
                <path d="M12 7v4"></path>
            </svg>
            <h4>ChatBot Restaurant</h4>
        </div>
        <div class="status">
            <p>✓ Activo</p>
            <div id="btn-container">
                <button>Desactivar</button>
                <button class="edit-btn">Editar</button>
                <button class="delete-btn">Eliminar</button>
            </div>
        </div>
    </article>

    <hr style="margin: 20px 0; border: 1px solid #249b81;">

    <h3>Introduce los datos de tu nuevo bot</h3>
    <form id="createBotForm">
        <article class="form-card">
            <div class="svg">
                <h4>Nombre del ChatBot</h4>
            </div>
            <input type="text" id="botName" name="botName" placeholder="Introduce el nombre de tu ChatBot" required>
        </article>

        <article class="form-card">
            <div class="svg">
                <h4>Objetivo del ChatBot</h4>
            </div>
            <textarea id="botObjective" name="botObjective" placeholder="Describe qué debe hacer tu ChatBot" rows="4" required></textarea>
        </article>

        <article class="form-card">
            <div class="svg">
                <h4>Tipo de ChatBot</h4>
            </div>
            <select id="botType" name="botType">
                <option value="ventas">Ventas</option>
                <option value="soporte">Soporte</option>
                <option value="reservas">Reservas</option>
                <option value="informacion">Información</option>
            </select>
            <button type="submit" class="btn-create">Crear ChatBot</button>
        </article>
    </form>
</section>
