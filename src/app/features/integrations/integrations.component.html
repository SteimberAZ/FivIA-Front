<section>
    <div id="welcome">
        <h2>Conexiones e Integraciones</h2>
    </div>
    <h3>Conecta tu IA con redes sociales</h3>

    <div style="display: flex; gap: 20px; flex-wrap: wrap;">
        <!-- Telegram (Active) -->
        <article style="flex: 1; min-width: 250px;">
            <div class="svg">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
                <h4>Telegram</h4>
            </div>
            <p>Conecta tu bot a Telegram vía BotFather.</p>
            <button class="activar" (click)="toggleTelegramForm()">Agregar Conexión</button>
            
            <div *ngIf="showTelegramForm" style="margin-top: 15px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px;">
                <p style="font-size: 14px; margin-bottom: 10px;">Crea tu bot en <a href="https://t.me/BotFather" target="_blank" style="color: #249b81;">&#64;BotFather</a> y pega el Token aquí.</p>
                <input type="text" placeholder="API Token (ej: 123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11)" style="width: 100%; margin-bottom: 10px;">
                <button class="btn-create" style="width: 100%;">Guardar Token</button>
            </div>
        </article>

        <!-- WhatsApp (Inactive) -->
        <article style="flex: 1; min-width: 250px; opacity: 0.5;">
            <div class="svg">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                </svg>
                <h4>WhatsApp</h4>
            </div>
            <p>Próximamente...</p>
            <button disabled>Agregar Conexión</button>
        </article>

        <!-- Instagram (Inactive) -->
        <article style="flex: 1; min-width: 250px; opacity: 0.5;">
            <div class="svg">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                    <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                </svg>
                <h4>Instagram</h4>
            </div>
            <p>Próximamente...</p>
            <button disabled>Agregar Conexión</button>
        </article>
    </div>
</section>
