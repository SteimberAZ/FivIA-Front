<section class="max-w-6xl mx-auto w-full">
    <div id="welcome" class="mb-8">
        <h2 class="text-3xl md:text-4xl font-bold font-outfit text-gray-800 dark:text-slate-100">Base de Conocimiento</h2>
    </div>
    
    <div class="mb-8">
        <h3 class="text-xl font-semibold font-outfit text-gray-700 dark:text-slate-200">Sube archivos para entrenar a tu IA</h3>
        <p class="text-gray-500 dark:text-slate-400 mt-2">La IA utilizará estos documentos como contexto exclusivo para responder.</p>
    </div>

    <article class="glass-card p-12 rounded-3xl border-2 border-dashed border-fivia dark:border-[#34d399] text-center cursor-pointer hover:bg-fivia/5 dark:hover:bg-[#34d399]/10 transition-all duration-300 group">
        <div class="flex justify-center mb-6 text-fivia dark:text-[#34d399] group-hover:scale-110 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-16 h-16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
        </div>
        <h4 class="text-xl font-bold font-outfit text-gray-800 dark:text-slate-100 mb-2">Arrastra y suelta tus archivos aquí</h4>
        <p class="text-gray-500 dark:text-slate-400 mb-6">Soporta Word, PDF, Excel y Texto plano.</p>
        <input type="file" class="hidden" id="fileUpload" multiple (change)="onFileSelected($event)">
        <button class="btn-primary" (click)="triggerFileInput()" [disabled]="isUploading">
            {{ isUploading ? 'Subiendo...' : 'Seleccionar Archivos' }}
        </button>
        <p *ngIf="uploadMessage" class="mt-4 text-sm font-bold" [ngClass]="uploadMessage.includes('Error') ? 'text-red-500' : 'text-fivia dark:text-[#34d399]'">
            {{ uploadMessage }}
        </p>
    </article>

    <div class="mt-12" *ngIf="uploadedFiles.length > 0">
        <h3 class="text-xl font-semibold font-outfit text-gray-700 dark:text-slate-200 mb-6">Archivos Subidos</h3>
        <ul class="flex flex-col gap-3">
            <li *ngFor="let file of uploadedFiles; let i = index" class="flex justify-between items-center p-4 bg-white/50 dark:bg-white/5 backdrop-blur-md rounded-xl border border-gray-200 dark:border-white/10 shadow-sm hover:shadow-md transition-shadow">
                <div class="flex items-center gap-3 text-gray-700 dark:text-slate-200 font-medium">
                    <span class="text-2xl">📄</span> {{ file.filename }}
                </div>
                <button (click)="deleteFile(i)" class="px-3 py-1.5 bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white rounded-lg text-sm font-semibold transition-colors">Eliminar</button>
            </li>
        </ul>
    </div>
</section>
