<section>
    <div id="welcome">
        <h2>Base de Conocimiento</h2>
    </div>
    <h3>Sube archivos para entrenar a tu IA</h3>
    <p>La IA utilizará estos documentos como contexto exclusivo para responder.</p>

    <article class="form-card" style="text-align: center; padding: 40px; border: 2px dashed #249b81; cursor: pointer;">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#249b81" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
        <h4 style="margin-top: 15px;">Arrastra y suelta tus archivos aquí</h4>
        <p>Soporta Word, PDF, Excel y Texto plano.</p>
        <input type="file" style="display: none;" id="fileUpload" multiple>
        <button style="margin-top: 15px;" (click)="triggerFileInput()">Seleccionar Archivos</button>
    </article>

    <div style="margin-top: 30px;">
        <h3>Archivos Subidos</h3>
        <ul>
            <li style="display: flex; justify-content: space-between; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 8px; margin-bottom: 10px;">
                <span>📄 manual_de_usuario.pdf</span>
                <button class="delete-btn" style="padding: 5px 10px; font-size: 12px;">Eliminar</button>
            </li>
        </ul>
    </div>
</section>
