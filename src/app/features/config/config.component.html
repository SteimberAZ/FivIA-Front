<div class="max-w-4xl mx-auto">
  <h2 class="text-3xl font-bold font-outfit text-gray-800 dark:text-slate-100 mb-2">Configuración</h2>
  <p class="text-gray-500 dark:text-slate-400 mb-8">Personaliza tu experiencia y ajusta las opciones de la plataforma.</p>

  <article class="glass-card rounded-2xl p-6 transition-all duration-300 flex flex-col gap-4">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-fivia" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
        </svg>
        <div>
          <h4 class="text-xl font-bold font-outfit text-gray-800 dark:text-slate-100">Modo Oscuro</h4>
          <p class="text-sm text-gray-500 dark:text-slate-400">Alternar entre el tema claro y oscuro de la plataforma.</p>
        </div>
      </div>
      
      <!-- Toggle Switch -->
      <button 
        (click)="toggleTheme()" 
        class="relative inline-flex h-7 w-14 items-center rounded-full transition-colors focus:outline-none"
        [ngClass]="isDarkMode ? 'bg-fivia' : 'bg-gray-300'">
        <span 
          class="inline-block h-5 w-5 transform rounded-full bg-white transition-transform"
          [ngClass]="isDarkMode ? 'translate-x-8' : 'translate-x-1'">
        </span>
      </button>
    </div>
  </article>

  <!-- More settings can go here -->
</div>
