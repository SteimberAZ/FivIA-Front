<!-- Mobile Drawer Backdrop Overlay -->
<div 
  *ngIf="uiService.isMobileMenuOpen()" 
  (click)="uiService.closeMobileMenu()"
  class="fixed inset-0 z-40 bg-black/60 backdrop-blur-sm md:hidden animate-fade-in"
></div>

<!-- Sidebar Container (Desktop Sidebar + Mobile Drawer) -->
<aside 
  class="h-full bg-white/95 dark:bg-[#0f1715]/95 backdrop-blur-xl p-6 border-r border-gray-200 dark:border-[#34d399]/20 transition-all duration-300 w-[260px] flex flex-col items-start 
         fixed md:relative inset-y-0 left-0 z-50 md:z-auto shadow-2xl md:shadow-none"
  [ngClass]="uiService.isMobileMenuOpen() ? 'translate-x-0' : '-translate-x-full md:translate-x-0'"
>
  <div class="flex items-center justify-between w-full mb-6">
    <h3 class="text-fivia dark:text-[#a7f3d0] text-xs uppercase tracking-wider font-semibold pl-2">
      Menú Principal
    </h3>
    <button (click)="uiService.closeMobileMenu()" type="button" class="md:hidden p-2 text-gray-400 hover:text-gray-700 dark:hover:text-white" aria-label="Cerrar Menú">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>
  
  <ul id="menul" class="list-none flex flex-col gap-2 w-full">
    <!-- 1. Dashboard -->
    <li class="w-full">
      <a 
        routerLink="/dashboard" 
        (click)="onNavClick()"
        routerLinkActive="bg-fivia/10 dark:bg-[#34d399]/20 text-fivia dark:text-[#34d399] font-bold" 
        class="flex items-center gap-3 px-4 py-3.5 min-h-[44px] rounded-xl text-gray-700 dark:text-slate-300 font-medium transition-all duration-200 hover:bg-fivia/10 hover:text-fivia dark:hover:bg-[#34d399]/10 dark:hover:text-white text-sm"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
        <span>Dashboard</span>
      </a>
    </li>
    
    <!-- 2. Live Chat -->
    <li class="w-full">
      <a 
        routerLink="/live-chat" 
        (click)="onNavClick()"
        routerLinkActive="bg-fivia/10 dark:bg-[#34d399]/20 text-fivia dark:text-[#34d399] font-bold" 
        class="flex items-center gap-3 px-4 py-3.5 min-h-[44px] rounded-xl text-gray-700 dark:text-slate-300 font-medium transition-all duration-200 hover:bg-fivia/10 hover:text-fivia dark:hover:bg-[#34d399]/10 dark:hover:text-white text-sm"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
        <span>Live Chat</span>
      </a>
    </li>

    <!-- 3. Conocimiento -->
    <li class="w-full">
      <a 
        routerLink="/knowledge-base" 
        (click)="onNavClick()"
        routerLinkActive="bg-fivia/10 dark:bg-[#34d399]/20 text-fivia dark:text-[#34d399] font-bold" 
        class="flex items-center gap-3 px-4 py-3.5 min-h-[44px] rounded-xl text-gray-700 dark:text-slate-300 font-medium transition-all duration-200 hover:bg-fivia/10 hover:text-fivia dark:hover:bg-[#34d399]/10 dark:hover:text-white text-sm"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span>Conocimiento</span>
      </a>
    </li>

    <!-- 4. Integraciones -->
    <li class="w-full">
      <a 
        routerLink="/integrations" 
        (click)="onNavClick()"
        routerLinkActive="bg-fivia/10 dark:bg-[#34d399]/20 text-fivia dark:text-[#34d399] font-bold" 
        class="flex items-center gap-3 px-4 py-3.5 min-h-[44px] rounded-xl text-gray-700 dark:text-slate-300 font-medium transition-all duration-200 hover:bg-fivia/10 hover:text-fivia dark:hover:bg-[#34d399]/10 dark:hover:text-white text-sm"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 7h.01"/><path d="M17 7h.01"/><path d="M12 17h.01"/></svg>
        <span>Integraciones</span>
      </a>
    </li>

    <!-- 5. Chatbot Management -->
    <li class="w-full">
      <a 
        routerLink="/chatbot-management" 
        (click)="onNavClick()"
        routerLinkActive="bg-fivia/10 dark:bg-[#34d399]/20 text-fivia dark:text-[#34d399] font-bold" 
        class="flex items-center gap-3 px-4 py-3.5 min-h-[44px] rounded-xl text-gray-700 dark:text-slate-300 font-medium transition-all duration-200 hover:bg-fivia/10 hover:text-fivia dark:hover:bg-[#34d399]/10 dark:hover:text-white text-sm"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
        <span>Chatbot</span>
      </a>
    </li>
  </ul>
</aside>
