<header class="sticky top-0 z-50 flex flex-col md:flex-row items-center justify-between px-6 py-4 bg-white/80 dark:bg-fivia-dark/80 backdrop-blur-xl border-b border-gray-200 dark:border-white/10 shadow-sm dark:shadow-2xl transition-colors duration-300">
  <div class="flex items-center gap-4 mb-4 md:mb-0 w-full md:w-auto justify-center md:justify-start">
    <div id="icono" class="flex items-center gap-3">
      <img src="assets/icono2.png" alt="Icono" class="w-10 h-10 floating">
      <h1 class="text-2xl font-bold font-outfit text-fivia dark:text-transparent dark:bg-clip-text dark:bg-gradient-to-r dark:from-[#34d399] dark:to-[#10b981]">
        FivIA
      </h1>
    </div>
  </div>

  <nav class="flex items-center gap-3 md:gap-4 w-full md:w-auto justify-center md:justify-end">
    <!-- Dark / Light Mode Toggle Button -->
    <button 
      (click)="themeService.toggleTheme()" 
      type="button"
      title="Cambiar Modo Claro/Oscuro"
      class="p-2 rounded-xl bg-gray-100 dark:bg-white/10 hover:bg-gray-200 dark:hover:bg-white/20 text-gray-700 dark:text-amber-400 border border-gray-200 dark:border-white/10 transition-all duration-300 flex items-center justify-center shadow-sm"
    >
      <!-- Sun Icon (when Dark) -->
      <svg *ngIf="themeService.isDarkMode()" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
      </svg>
      <!-- Moon Icon (when Light) -->
      <svg *ngIf="!themeService.isDarkMode()" class="w-5 h-5 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
      </svg>
    </button>

    <!-- Logged in User Badge -->
    <div *ngIf="authService.currentUser() as user" class="flex items-center gap-2 px-3.5 py-1.5 rounded-full bg-fivia/10 border border-fivia/20 text-xs font-semibold text-gray-700 dark:text-slate-200">
      <div class="w-6 h-6 rounded-full bg-gradient-to-tr from-[#34d399] to-[#10b981] flex items-center justify-center text-slate-950 font-bold text-xs">
        {{ user.name.charAt(0) }}
      </div>
      <span class="font-outfit">{{ user.name }}</span>
    </div>

    <a href="#" (click)="logout($event)" id="salir" class="nav-btn text-gray-700 dark:text-[#cbd5e1] text-sm md:text-base hover:!text-red-500 font-medium transition-colors">
      Cerrar Sesión
    </a>
  </nav>
</header>
